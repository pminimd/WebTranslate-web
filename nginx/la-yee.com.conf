# Web Translate 落地页 — Nginx 反向代理（HTTP）
#
# 前置：./run.sh 已在本机 5007 端口运行
#
# 安装：
#   sudo cp nginx/la-yee.com.conf /etc/nginx/conf.d/la-yee.com.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# DNS：la-yee.com、www.la-yee.com → 本机公网 IP

upstream web_translate_landing {
    server 127.0.0.1:5007;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name la-yee.com www.la-yee.com;

    access_log /var/log/nginx/la-yee.com.access.log;
    error_log  /var/log/nginx/la-yee.com.error.log;

    client_max_body_size 1m;

    location / {
        proxy_pass http://web_translate_landing;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
